<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Growe Coach — Iniciar sesión</title>
  <link rel="stylesheet" href="shared/tokens.css" />
  <link rel="stylesheet" href="shared/components.css" />
</head>
<body>
  <div class="auth-shell">
    <!-- Theme toggle (esquina superior derecha) -->
    <button
      class="theme-toggle"
      style="position: absolute; top: var(--space-xl); right: var(--space-xl); z-index: 2;"
      onclick="document.documentElement.dataset.theme = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark'"
      title="Cambiar tema"
    >
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/>
      </svg>
    </button>

    <div class="auth-card">
      <img class="auth-wordmark auth-wordmark-dark" src="assets/growe_wordmark.svg" alt="Growe" />
      <img class="auth-wordmark auth-wordmark-light" src="assets/growe_wordmark_black.svg" alt="Growe" />
      <p class="muted text-xs" style="text-align: center; text-transform: uppercase; letter-spacing: 1.5px; margin: -8px 0 var(--space-md);">Coach Panel</p>

      <h1 class="auth-title">Hola de nuevo</h1>
      <p class="auth-subtitle">Iniciá sesión para gestionar tus alumnos</p>

      <div class="field">
        <label class="field-label" for="email">Email</label>
        <div class="input-with-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
          </svg>
          <input class="input" type="email" id="email" placeholder="entrenador@growe.fit" value="ana.coach@growe.fit" />
        </div>
      </div>

      <div class="field">
        <label class="field-label" for="password">Contraseña</label>
        <div class="input-with-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input class="input" type="password" id="password" placeholder="••••••••" value="password123" />
        </div>
      </div>

      <div style="display: flex; justify-content: flex-end;">
        <a href="#" class="text-sm">¿Olvidaste tu contraseña?</a>
      </div>

      <button class="btn btn-lg" style="width: 100%; margin-top: var(--space-sm);">Ingresar</button>

      <p class="auth-footer">
        ¿No tenés cuenta? <a href="#">Registrate como coach</a>
      </p>

      <div class="divider"></div>

      <p class="auth-footer text-xs">
        Solo coaches pueden acceder al panel web.
        <br />Los alumnos deben usar la app mobile.
      </p>
    </div>
  </div>
</body>
</html>
